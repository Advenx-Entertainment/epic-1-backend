<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>WebSocket Test</title>
  <link rel="icon" href="data:,">
</head>
<body>
  <h2>WebSocket Test</h2>

  <label>Server URL: <input id="server-url" value="wss://YOUR_NGROK_OR_SERVER_URL" size="50" /></label><br><br>
  <label>Device ID: <input id="device-id" value="co-dashboard" /></label><br><br>
  <button onclick="connect()">Connect</button>
  <button onclick="disconnect()">Disconnect</button>
  <br><br>

  <label>Message: <input id="msg-input" value='{"type":"command","action":"laser_trip","target":"all"}' size="60" /></label>
  <button onclick="sendMsg()">Send</button>
  <br><br>

  <strong>Status:</strong> <span id="status">Disconnected</span>
  <br><br>

  <strong>Log:</strong><br>
  <textarea id="log" rows="20" cols="80" readonly></textarea>
  <br>
  <button onclick="document.getElementById('log').value=''">Clear</button>

  <script>
    let ws = null;

    function log(msg) {
      const box = document.getElementById("log");
      box.value += new Date().toLocaleTimeString() + " — " + msg + "\n";
      box.scrollTop = box.scrollHeight;
    }

    function connect() {
      const id = document.getElementById("device-id").value;
      const serverUrl = document.getElementById("server-url").value;
      ws = new WebSocket(`${serverUrl}/ws/${id}`);

      ws.onopen = () => {
        document.getElementById("status").textContent = "Connected";
        log("Connected as: " + id);
      };

      ws.onmessage = (e) => {
        log("Received: " + e.data);
      };

      ws.onclose = () => {
        document.getElementById("status").textContent = "Disconnected";
        log("Connection closed.");
      };

      ws.onerror = (e) => {
        log("Error: " + JSON.stringify(e));
      };
    }

    function disconnect() {
      if (ws) ws.close();
    }

    function sendMsg() {
      if (!ws || ws.readyState !== WebSocket.OPEN) {
        log("Not connected.");
        return;
      }
      const msg = document.getElementById("msg-input").value;
      ws.send(msg);
      log("Sent: " + msg);
    }
  </script>
</body>
</html>
